kind = "web"
previewPath = "/"
title = "Japanese Learning App"
version = "1.0.0"
id = "artifacts/japanese-learning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23235

[services.development]
run = "pnpm --filter @workspace/japanese-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/japanese-learning", "run", "build" ]
publicDir = "artifacts/japanese-learning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23235"
BASE_PATH = "/"
